      - name: Verify Android build output
        shell: bash
        env:
          BUILD_FORMAT: ${{ inputs.build_format }}
          APK_OUTPUT_PATH: ${{ steps.resolve_version.outputs.apk_output_path }}
          AAB_OUTPUT_PATH: ${{ steps.resolve_version.outputs.aab_output_path }}
        run: |
          set -euo pipefail
          sudo chown -R "$USER:$USER" build Builds game/build game/Builds game/Library/Bee/Android 2>/dev/null || true
          mkdir -p "$(dirname "$APK_OUTPUT_PATH")" "$(dirname "$AAB_OUTPUT_PATH")"

          verify_one() {
            local output_path="$1"
            local ext="$2"

            if [ ! -f "$output_path" ]; then
              echo "Android $ext was not created at expected path: $output_path"
              echo "Searching for .$ext files in Unity output folders..."
              found_output="$(find build/android Builds game/build game/Builds game/Library/Bee/Android -type f -name "*.$ext" -print 2>/dev/null | head -n 1 || true)"
              if [ -n "$found_output" ]; then
                echo "Found .$ext at $found_output"
                cp "$found_output" "$output_path"
              fi
            fi

            if [ ! -f "$output_path" ]; then
              echo "Android $ext was not created and no fallback .$ext was found."
              echo "----- android package files -----"
              find . -type f \( -name '*.apk' -o -name '*.aab' \) -print || true
              echo "----- build files -----"
              find build Builds game/build game/Builds game/Library/Bee/Android -maxdepth 8 -type f -print 2>/dev/null || true
              echo "----- important Unity log lines from console log -----"
              if [ -f build/unity-build.log ]; then
                grep -E "ZeyWinActions|Build result|error CS|Script Compilation Error|Exception|Android build failed" build/unity-build.log || true
              elif [ -f game/build/unity-build.log ]; then
                grep -E "ZeyWinActions|Build result|error CS|Script Compilation Error|Exception|Android build failed" game/build/unity-build.log || true
              else
                echo "Unity log file was not written because Unity logs are streamed to the GitHub Actions console."
              fi
              exit 1
            fi

            ls -lh "$output_path"
          }

          if [ "$BUILD_FORMAT" = "aab" ]; then
            verify_one "$AAB_OUTPUT_PATH" "aab"
          elif [ "$BUILD_FORMAT" = "apk_aab" ]; then
            verify_one "$APK_OUTPUT_PATH" "apk"
            verify_one "$AAB_OUTPUT_PATH" "aab"
          else
            verify_one "$APK_OUTPUT_PATH" "apk"
          fi

      - name: Sign Android App Bundle
        if: ${{ inputs.build_format == 'aab' || inputs.build_format == 'apk_aab' }}
        shell: bash
        env:
          AAB_OUTPUT_PATH: ${{ steps.resolve_version.outputs.aab_output_path }}
        run: |
          set -euo pipefail
          test -f "$AAB_OUTPUT_PATH" || { echo "AAB not found before signing: $AAB_OUTPUT_PATH"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASS" || { echo "ANDROID_KEYSTORE_PASS secret is empty."; exit 1; }

          alias_name="${ANDROID_KEYALIAS_NAME:-social casino}"
          alias_pass="${ANDROID_KEYALIAS_PASS:-$ANDROID_KEYSTORE_PASS}"
          unsigned_path="/tmp/$(basename "${AAB_OUTPUT_PATH%.aab}")-unsigned.aab"
          cp "$AAB_OUTPUT_PATH" "$unsigned_path"

          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$GITHUB_WORKSPACE/.ci/keystore/user.keystore" \
            -storepass "$ANDROID_KEYSTORE_PASS" \
            -keypass "$alias_pass" \
            "$AAB_OUTPUT_PATH" \
            "$alias_name"

          jarsigner -verify -verbose -certs "$AAB_OUTPUT_PATH" | tee /tmp/aab-signature-verify.txt
          if grep -q "jar is unsigned" /tmp/aab-signature-verify.txt; then
            echo "AAB is still unsigned after jarsigner."
            exit 1
          fi

      - name: Prepare Google Play release notes
        if: ${{ inputs.publish_to_google_play == 'true' }}
        shell: bash
        env:
          VERSION_NAME: ${{ steps.resolve_version.outputs.version_name }}
        run: |
          set -euo pipefail
          mkdir -p whatsnew
          printf 'Bug fixes and SDK updates for version %s.\n' "$VERSION_NAME" > whatsnew/whatsnew-en-US

      - name: Check Google Play API access
        id: google_play_access
        if: ${{ inputs.publish_to_google_play == 'true' }}
        continue-on-error: true
        working-directory: google-play-connect
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: node scripts/check-play-access.mjs

      - name: Upload AAB to Google Play
        if: ${{ inputs.publish_to_google_play == 'true' && steps.google_play_access.outcome == 'success' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ inputs.package_name }}
          releaseFiles: ${{ steps.resolve_version.outputs.aab_output_path }}
          track: ${{ inputs.google_play_track }}
          status: ${{ inputs.google_play_status }}
          releaseName: ${{ steps.resolve_version.outputs.version_name }}
          whatsNewDirectory: whatsnew

      - name: Upload Android package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.build_format == 'apk_aab' && 'APK_AAB' || (inputs.build_format == 'aab' && 'AAB' || 'APK') }}_${{ inputs.package_name }}_v${{ steps.resolve_version.outputs.version_code }}
          path: |
            build/android/*.apk
            build/android/*.aab
          if-no-files-found: error

      - name: Publish Android package release and metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_FORMAT: ${{ inputs.build_format }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          VERSION_NAME: ${{ steps.resolve_version.outputs.version_name }}
          VERSION_CODE: ${{ steps.resolve_version.outputs.version_code }}
          APK_OUTPUT_PATH: ${{ steps.resolve_version.outputs.apk_output_path }}
          AAB_OUTPUT_PATH: ${{ steps.resolve_version.outputs.aab_output_path }}
          PUBLISH_TO_GOOGLE_PLAY: ${{ inputs.publish_to_google_play }}
          GOOGLE_PLAY_TRACK: ${{ inputs.google_play_track }}
          GOOGLE_PLAY_STATUS: ${{ inputs.google_play_status }}
          GOOGLE_PLAY_API_ACCESS: ${{ steps.google_play_access.outcome || 'skipped' }}
          REQUIRE_GOOGLE_PLAY_UPLOAD: ${{ inputs.require_google_play_upload }}
        run: |
          set -euo pipefail
          package_paths=()
          if [ "$BUILD_FORMAT" = "aab" ]; then
            package_paths+=("$AAB_OUTPUT_PATH")
          elif [ "$BUILD_FORMAT" = "apk_aab" ]; then
            package_paths+=("$APK_OUTPUT_PATH" "$AAB_OUTPUT_PATH")
          else
            package_paths+=("$APK_OUTPUT_PATH")
          fi

          for package_path in "${package_paths[@]}"; do
            if [ ! -f "$package_path" ]; then
              echo "Expected Android package is missing before release publish: $package_path"
              exit 1
            fi
          done

          version_dir="builds/$PACKAGE_NAME/v$VERSION_CODE"
          latest_dir="builds/$PACKAGE_NAME"
          mkdir -p "$version_dir" "$latest_dir"
          release_tag="android-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$release_tag"
          release_assets=()
          for package_path in "${package_paths[@]}"; do
            package_name="$(basename "$package_path")"
            release_assets+=("$package_path#$package_name")
          done

          gh release create "$release_tag" "${release_assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${BUILD_FORMAT^^} $PACKAGE_NAME v$VERSION_CODE" \
            --notes "${BUILD_FORMAT^^} built by GitHub Actions run $GITHUB_RUN_NUMBER attempt $GITHUB_RUN_ATTEMPT."

          git fetch origin "$GITHUB_REF_NAME"
          git reset --hard "origin/$GITHUB_REF_NAME"
          mkdir -p "$version_dir" "$latest_dir"
          package_repo_paths=()
          apk_asset=""
          apk_path=""
          aab_asset=""
          aab_path=""

          for package_path in "${package_paths[@]}"; do
            package_name="$(basename "$package_path")"
            package_ext="${package_name##*.}"
            package_size="$(wc -c < "$package_path")"
            if [ "$package_size" -lt 90000000 ]; then
              cp "$package_path" "$version_dir/$package_name"
              package_repo_path="$version_dir/$package_name"
            else
              package_repo_path="$version_dir/$package_name.url"
              printf '%s\n' "$release_url" > "$package_repo_path"
            fi
            shasum -a 256 "$package_path" | sed "s#  .*#  $package_name#" > "$version_dir/$package_name.sha256"
            package_repo_paths+=("$package_repo_path" "$version_dir/$package_name.sha256")

            if [ "$package_ext" = "apk" ]; then
              apk_asset="$package_name"
              apk_path="$package_repo_path"
            elif [ "$package_ext" = "aab" ]; then
              aab_asset="$package_name"
              aab_path="$package_repo_path"
            fi
          done

          package_repo_path="${apk_path:-$aab_path}"

          {
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "run_attempt=$GITHUB_RUN_ATTEMPT"
            echo "commit_sha=$GITHUB_SHA"
            echo "ref=$GITHUB_REF_NAME"
            echo "package_name=$PACKAGE_NAME"
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "build_format=$BUILD_FORMAT"
            echo "apk_artifact=${BUILD_FORMAT^^}_${PACKAGE_NAME}_v${VERSION_CODE}"
            echo "apk_release=$release_url"
            if [ -n "$apk_asset" ]; then
              echo "apk_asset=$apk_asset"
              echo "apk_path=$apk_path"
            fi
            if [ -n "$aab_asset" ]; then
              echo "aab_asset=$aab_asset"
              echo "aab_path=$aab_path"
            fi
            echo "package_repo_path=$package_repo_path"
            echo "built_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "run_url=https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            if [ "$PUBLISH_TO_GOOGLE_PLAY" = "true" ]; then
              echo "google_play_track=$GOOGLE_PLAY_TRACK"
              echo "google_play_status=$GOOGLE_PLAY_STATUS"
              echo "google_play_api_access=$GOOGLE_PLAY_API_ACCESS"
              echo "require_google_play_upload=$REQUIRE_GOOGLE_PLAY_UPLOAD"
              if [ "$GOOGLE_PLAY_API_ACCESS" = "success" ]; then
                echo "google_play_upload=api"
              else
                echo "google_play_upload=ui_fallback_required"
              fi
            fi
          } > "$version_dir/build.txt"

          if [ "$PUBLISH_TO_GOOGLE_PLAY" = "true" ] && [ "$GOOGLE_PLAY_API_ACCESS" != "success" ]; then
            {
              echo "# Google Play UI Upload Fallback"
              echo
              echo "The AAB was built successfully, but Google Play API access was not available for the service account."
              echo "Upload this package through the Google Play Console web interface from a logged-in browser."
              echo
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Package | \`$PACKAGE_NAME\` |"
              echo "| Version name | \`$VERSION_NAME\` |"
              echo "| Version code | \`$VERSION_CODE\` |"
              echo "| Track | \`$GOOGLE_PLAY_TRACK\` |"
              echo "| Release status | \`$GOOGLE_PLAY_STATUS\` |"
              echo "| File | \`$package_repo_path\` |"
              echo "| GitHub release | $release_url |"
              echo
              echo "## Steps"
              echo
              echo "1. Open the app in Google Play Console."
              echo "2. Open the release track: \`$GOOGLE_PLAY_TRACK\`."
              echo "3. Create a new release or edit the draft release."
              echo "4. Upload the AAB from this build."
              echo "5. Use release name \`$VERSION_NAME\` and release notes from \`whatsnew/whatsnew-en-US\`."
              echo "6. Save, review, and send the release according to the selected status."
              echo
              echo "Service account that still needs Play Console permissions:"
              echo
              echo "\`zeywin-play-publisher@zeywin-connect.iam.gserviceaccount.com\`"
            } > "$version_dir/google-play-ui-upload.md"
          fi

          current_latest_code="$(sed -n 's/^version_code=//p' "$latest_dir/latest-build.txt" 2>/dev/null | tail -n 1 || true)"
          if ! [[ "$current_latest_code" =~ ^[0-9]+$ ]]; then
            current_latest_code=0
          fi

          latest_files=("$version_dir/build.txt")
          if [ -f "$version_dir/google-play-ui-upload.md" ]; then
            latest_files+=("$version_dir/google-play-ui-upload.md")
          fi
          if [ "$VERSION_CODE" -ge "$current_latest_code" ]; then
            cp "$version_dir/build.txt" "$latest_dir/latest-build.txt"
            latest_files+=("$latest_dir/latest-build.txt")
          else
            echo "Built old version code $VERSION_CODE. Keeping latest-build.txt at version code $current_latest_code."
          fi

          {
            echo "# Latest APK Builds"
            echo
            echo "Use this table before workflow runs. For a new release, use the next manual values. For an old-version rebuild, enter the old version manually."
            echo
            echo "| Package | Latest version name | Latest version code | Next manual version name | Next manual version code | APK |"
            echo "| --- | --- | ---: | --- | ---: | --- |"
            while IFS= read -r latest_file; do
              pkg="$(sed -n 's/^package_name=//p' "$latest_file" | tail -n 1)"
              name="$(sed -n 's/^version_name=//p' "$latest_file" | tail -n 1)"
              code="$(sed -n 's/^version_code=//p' "$latest_file" | tail -n 1)"
              path="$(sed -n 's/^package_repo_path=//p' "$latest_file" | tail -n 1)"
              if [ -z "$path" ]; then
                path="$(sed -n 's/^apk_path=//p' "$latest_file" | tail -n 1)"
              fi
              if [[ "$code" =~ ^[0-9]+$ ]]; then
                next_code=$((code + 1))
              else
                next_code=1
              fi
              echo "| \`$pkg\` | \`$name\` | \`$code\` | \`1.0.$next_code\` | \`$next_code\` | [$path]($path) |"
            done < <(find builds -mindepth 2 -maxdepth 2 -name latest-build.txt -type f | sort)
          } > builds/index.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "${package_repo_paths[@]}" "${latest_files[@]}" builds/index.md

          if git diff --cached --quiet; then
            echo "APK metadata in repository is already up to date: builds/latest-build.txt"
            exit 0
          fi

          git commit -m "Record Android package from GitHub Actions run $GITHUB_RUN_NUMBER"
          if ! git pull --rebase --autostash origin "$GITHUB_REF_NAME"; then
            echo "Metadata rebase failed after APK release upload. APK is already available in the release: $release_url"
            exit 0
          fi

          if ! git push origin "HEAD:$GITHUB_REF_NAME"; then
            echo "Metadata push failed after APK release upload. APK is already available in the release: $release_url"
            exit 0
          fi

      - name: Require Google Play upload
        if: ${{ inputs.publish_to_google_play == 'true' && inputs.require_google_play_upload == 'true' && steps.google_play_access.outcome != 'success' }}
        shell: bash
        run: |
          echo "Google Play upload was requested, but API access failed. The AAB was built and saved, but it was not uploaded to Google Play."
          echo "Grant the service account Play Console release permissions, then rerun with build_format=aab and publish_to_google_play=true."
          exit 1
