name: Build Android Play Release
run-name: "Android: ${{ inputs.app_name }} / ${{ inputs.package_name }} / ${{ inputs.build_format }} / ${{ inputs.builder_request_id || github.run_id }}"

on:
  workflow_dispatch:
    inputs:
      builder_request_id:
        description: Android Builder request id
        required: false
        default: ''
      game_repository:
        description: Private game repository to checkout
        required: true
        default: zey-win/plinko
      game_ref:
        description: Game repository branch, tag, or commit
        required: true
        default: main
      package_name:
        description: Android package name for this APK
        required: true
        default: com.playsocialgames.plinko
      app_name:
        description: App display name
        required: true
        default: Plinko
      icon_png_path:
        description: Optional PNG icon URL (https://...) or path inside game repository Assets folder
        required: false
        default: ''
      zeywin_api_key:
        description: ZeyWin API key for this package
        required: false
        default: ''
      version_mode:
        description: auto_next = easiest; manual = use the two version fields below
        required: true
        default: auto_next
        type: choice
        options:
          - auto_next
          - manual
      version_name:
        description: Manual only. For old rebuilds you may enter 1, for normal releases see builds/index.md.
        required: false
        default: ''
      version_code:
        description: Manual only. Positive integer. For old rebuilds you may enter 1.
        required: false
        default: ''
      build_format:
        description: apk, aab, or apk_aab
        required: true
        default: apk_aab
        type: choice
        options:
          - apk
          - aab
          - apk_aab
      fast_build:
        description: Use cache and Android ARM64-only fast mode
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      signing_profile:
        description: Android signing profile
        required: true
        default: playmax
        type: choice
        options:
          - playmax
          - slotspot
          - playsocialgames
      publish_to_google_play:
        description: Upload AAB to Google Play after build. Requires GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret.
        required: true
        default: 'true'
        type: choice
        options:
          - 'false'
          - 'true'
      google_play_track:
        description: Google Play track for automatic upload
        required: true
        default: production
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      google_play_status:
        description: Google Play release status
        required: true
        default: completed
        type: choice
        options:
          - draft
          - completed
      require_google_play_upload:
        description: Fail the workflow if Google Play upload is requested but cannot be completed
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      admob_android_app_id:
        description: AdMob Android app id
        required: false
      admob_android_banner_id:
        description: AdMob Android banner unit id
        required: false
      admob_android_interstitial_id:
        description: AdMob Android interstitial unit id
        required: false
      admob_android_rewarded_id:
        description: AdMob Android rewarded unit id
        required: false
      admob_android_rewarded_interstitial_id:
        description: AdMob Android rewarded interstitial unit id
        required: false
      admob_android_native_id:
        description: AdMob Android native unit id
        required: false
      admob_android_app_open_id:
        description: AdMob Android app open unit id
        required: false
  workflow_call:
    inputs:
      builder_request_id:
        description: Android Builder request id
        required: false
        default: ''
        type: string
      game_repository:
        description: Private game repository to checkout
        required: true
        type: string
      game_ref:
        description: Game repository branch, tag, or commit
        required: false
        default: main
        type: string
      package_name:
        description: Android package name
        required: true
        type: string
      app_name:
        description: App display name
        required: true
        type: string
      icon_png_path:
        description: Optional PNG icon URL (https://...) or path inside game repository Assets folder
        required: false
        default: ''
        type: string
      zeywin_api_key:
        description: ZeyWin API key for this package
        required: false
        default: ''
        type: string
      version_mode:
        description: auto_next or manual
        required: false
        default: auto_next
        type: string
      version_name:
        description: Manual version name
        required: false
        default: ''
        type: string
      version_code:
        description: Manual version code
        required: false
        default: ''
        type: string
      build_format:
        description: apk, aab, or apk_aab
        required: false
        default: apk_aab
        type: string
      fast_build:
        description: Use cache and Android ARM64-only fast mode
        required: false
        default: 'false'
        type: string
      signing_profile:
        description: "Android signing profile: playmax, slotspot, or playsocialgames"
        required: false
        default: playmax
        type: string
      publish_to_google_play:
        description: Upload AAB to Google Play after build
        required: false
        default: 'true'
        type: string
      google_play_track:
        description: Google Play track
        required: false
        default: production
        type: string
      google_play_status:
        description: Google Play release status
        required: false
        default: completed
        type: string
      require_google_play_upload:
        description: Fail if Google Play upload cannot be completed
        required: false
        default: 'true'
        type: string
      admob_android_app_id:
        required: false
        default: ''
        type: string
      admob_android_banner_id:
        required: false
        default: ''
        type: string
      admob_android_interstitial_id:
        required: false
        default: ''
        type: string
      admob_android_rewarded_id:
        required: false
        default: ''
        type: string
      admob_android_rewarded_interstitial_id:
        required: false
        default: ''
        type: string
      admob_android_native_id:
        required: false
        default: ''
        type: string
      admob_android_app_open_id:
        required: false
        default: ''
        type: string
    secrets:
      PRIVATE_REPO_TOKEN:
        required: true
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASS:
        required: true
      ANDROID_KEYALIAS_NAME:
        required: true
      ANDROID_KEYALIAS_PASS:
        required: true
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: false
      PLAYSOCIALGAMES_ANDROID_KEYSTORE_BASE64:
        required: false
      PLAYSOCIALGAMES_ANDROID_KEYSTORE_PASS:
        required: false
      PLAYSOCIALGAMES_ANDROID_KEYALIAS_NAME:
        required: false
      PLAYSOCIALGAMES_ANDROID_KEYALIAS_PASS:
        required: false
      SLOTSPOT_ANDROID_KEYSTORE_BASE64:
        required: false
      SLOTSPOT_ANDROID_KEYSTORE_PASS:
        required: false
      SLOTSPOT_ANDROID_KEYALIAS_NAME:
        required: false
      SLOTSPOT_ANDROID_KEYALIAS_PASS:
        required: false
      ZEYWIN_API_KEY:
        required: false
      ADMOB_ANDROID_APP_ID:
        required: false
      ADMOB_ANDROID_BANNER_ID:
        required: false
      ADMOB_ANDROID_INTERSTITIAL_ID:
        required: false
      ADMOB_ANDROID_REWARDED_ID:
        required: false
      ADMOB_ANDROID_REWARDED_INTERSTITIAL_ID:
        required: false
      ADMOB_ANDROID_NATIVE_ID:
        required: false
      ADMOB_ANDROID_APP_OPEN_ID:
        required: false

concurrency:
  group: apk-build-${{ github.ref }}-${{ inputs.package_name || 'unknown-package' }}
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs and secrets
        shell: bash
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          APP_NAME: ${{ inputs.app_name }}
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          echo "::add-mask::${{ inputs.zeywin_api_key || secrets.ZEYWIN_API_KEY }}"
          echo "::add-mask::${{ inputs.admob_android_app_id || secrets.ADMOB_ANDROID_APP_ID }}"
          echo "::add-mask::${{ inputs.admob_android_banner_id || secrets.ADMOB_ANDROID_BANNER_ID }}"
          echo "::add-mask::${{ inputs.admob_android_interstitial_id || secrets.ADMOB_ANDROID_INTERSTITIAL_ID }}"
          echo "::add-mask::${{ inputs.admob_android_rewarded_id || secrets.ADMOB_ANDROID_REWARDED_ID }}"
          echo "::add-mask::${{ inputs.admob_android_rewarded_interstitial_id || secrets.ADMOB_ANDROID_REWARDED_INTERSTITIAL_ID }}"
          echo "::add-mask::${{ inputs.admob_android_native_id || secrets.ADMOB_ANDROID_NATIVE_ID }}"
          echo "::add-mask::${{ inputs.admob_android_app_open_id || secrets.ADMOB_ANDROID_APP_OPEN_ID }}"
          test -n "$PRIVATE_REPO_TOKEN" || { echo "Missing PRIVATE_REPO_TOKEN secret for private game/SDK checkout."; exit 1; }
          test -n "$PACKAGE_NAME" || { echo "package_name is required."; exit 1; }
          test -n "$APP_NAME" || { echo "app_name is required."; exit 1; }
          test -n "${{ inputs.zeywin_api_key || secrets.ZEYWIN_API_KEY }}" || { echo "zeywin_api_key input or ZEYWIN_API_KEY secret is required."; exit 1; }
          if [ "${{ inputs.publish_to_google_play }}" = "true" ]; then
            [[ "${{ inputs.build_format }}" == "aab" || "${{ inputs.build_format }}" == "apk_aab" ]] || { echo "Google Play publishing requires build_format=aab or apk_aab."; exit 1; }
            test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" || { echo "Missing GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret for Google Play publishing."; exit 1; }
          fi

      - name: Checkout private game project
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.game_repository }}
          ref: ${{ inputs.game_ref }}
          path: game
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          persist-credentials: false
          fetch-depth: 0
          lfs: true

      - name: Download custom icon from static site
        shell: bash
        env:
          ICON_PNG_PATH: ${{ inputs.icon_png_path }}
        run: |
          set -euo pipefail
          
          # Если icon_png_path начинается с https://, скачиваем иконку
          if [[ "$ICON_PNG_PATH" == https://* ]]; then
            echo "🌐 Downloading custom icon from: $ICON_PNG_PATH"
            mkdir -p game/Assets/CustomIcons
            curl -fsSL "$ICON_PNG_PATH" -o game/Assets/CustomIcons/custom-icon.png
            
            # Проверяем что файл скачался
            if [ -f game/Assets/CustomIcons/custom-icon.png ]; then
              file_size=$(stat -c%s "game/Assets/CustomIcons/custom-icon.png" 2>/dev/null || stat -f%z "game/Assets/CustomIcons/custom-icon.png" 2>/dev/null || echo "0")
              echo "✅ Icon downloaded successfully ($file_size bytes)"
              echo "ANDROID_ICON_PNG_PATH=Assets/CustomIcons/custom-icon.png" >> "$GITHUB_ENV"
            else
              echo "❌ Failed to download icon"
              exit 1
            fi
          elif [ -n "$ICON_PNG_PATH" ]; then
            # Локальный путь в репозитории - проверяем существование
            if [ -f "game/$ICON_PNG_PATH" ]; then
              echo "✅ Using icon from game repository: $ICON_PNG_PATH"
              echo "ANDROID_ICON_PNG_PATH=$ICON_PNG_PATH" >> "$GITHUB_ENV"
            else
              echo "⚠️  Icon not found in game repository: $ICON_PNG_PATH"
              echo "Will use project's default icon"
            fi
          else
            echo "ℹ️  No custom icon specified, using project default"
          fi

      - name: Configure private SDK access
        shell: bash
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Verify GitHub hosted runner
        shell: bash
        run: |
          set -euo pipefail
          echo "runner_environment=${{ runner.environment }}"
          echo "runner_os=${{ runner.os }}"
          echo "runner_name=${{ runner.name }}"
          if [ "${{ runner.environment }}" != "github-hosted" ]; then
            echo "This workflow must run on a GitHub-hosted runner, not on a local self-hosted machine."
            exit 1
          fi

      - name: Restore Android keystore
        shell: bash
        env:
          SIGNING_PROFILE: ${{ inputs.signing_profile }}
          ANDROID_KEYSTORE_BASE64_DEFAULT: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS_DEFAULT: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_NAME_DEFAULT: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          ANDROID_KEYALIAS_PASS_DEFAULT: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          PLAYSOCIALGAMES_ANDROID_KEYSTORE_BASE64: ${{ secrets.PLAYSOCIALGAMES_ANDROID_KEYSTORE_BASE64 }}
          PLAYSOCIALGAMES_ANDROID_KEYSTORE_PASS: ${{ secrets.PLAYSOCIALGAMES_ANDROID_KEYSTORE_PASS }}
          PLAYSOCIALGAMES_ANDROID_KEYALIAS_NAME: ${{ secrets.PLAYSOCIALGAMES_ANDROID_KEYALIAS_NAME }}
          PLAYSOCIALGAMES_ANDROID_KEYALIAS_PASS: ${{ secrets.PLAYSOCIALGAMES_ANDROID_KEYALIAS_PASS }}
          SLOTSPOT_ANDROID_KEYSTORE_BASE64: ${{ secrets.SLOTSPOT_ANDROID_KEYSTORE_BASE64 }}
          SLOTSPOT_ANDROID_KEYSTORE_PASS: ${{ secrets.SLOTSPOT_ANDROID_KEYSTORE_PASS }}
          SLOTSPOT_ANDROID_KEYALIAS_NAME: ${{ secrets.SLOTSPOT_ANDROID_KEYALIAS_NAME }}
          SLOTSPOT_ANDROID_KEYALIAS_PASS: ${{ secrets.SLOTSPOT_ANDROID_KEYALIAS_PASS }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.ci/keystore"

          case "$SIGNING_PROFILE" in
            playmax|default|'')
              keystore_base64="$ANDROID_KEYSTORE_BASE64_DEFAULT"
              keystore_pass="$ANDROID_KEYSTORE_PASS_DEFAULT"
              keyalias_name="$ANDROID_KEYALIAS_NAME_DEFAULT"
              keyalias_pass="$ANDROID_KEYALIAS_PASS_DEFAULT"
              profile_name="playmax"
              ;;
            playsocialgames)
              keystore_base64="$PLAYSOCIALGAMES_ANDROID_KEYSTORE_BASE64"
              keystore_pass="$PLAYSOCIALGAMES_ANDROID_KEYSTORE_PASS"
              keyalias_name="$PLAYSOCIALGAMES_ANDROID_KEYALIAS_NAME"
              keyalias_pass="$PLAYSOCIALGAMES_ANDROID_KEYALIAS_PASS"
              profile_name="playsocialgames"
              ;;
            slotspot)
              keystore_base64="$SLOTSPOT_ANDROID_KEYSTORE_BASE64"
              keystore_pass="$SLOTSPOT_ANDROID_KEYSTORE_PASS"
              keyalias_name="$SLOTSPOT_ANDROID_KEYALIAS_NAME"
              keyalias_pass="$SLOTSPOT_ANDROID_KEYALIAS_PASS"
              profile_name="slotspot"
              ;;
            *)
              echo "Unknown signing_profile: $SIGNING_PROFILE"
              exit 1
              ;;
          esac

          test -n "$keystore_base64" || { echo "Android keystore secret is empty for signing_profile=$profile_name"; exit 1; }
          test -n "$keystore_pass" || { echo "Android keystore password is empty for signing_profile=$profile_name"; exit 1; }
          test -n "$keyalias_name" || { echo "Android key alias name is empty for signing_profile=$profile_name"; exit 1; }
          keyalias_pass="${keyalias_pass:-$keystore_pass}"

          echo "$keystore_base64" | base64 --decode > "$GITHUB_WORKSPACE/.ci/keystore/user.keystore"
          test -s "$GITHUB_WORKSPACE/.ci/keystore/user.keystore" || { echo "Decoded Android keystore is empty for signing_profile=$profile_name"; exit 1; }

          {
            echo "ANDROID_KEYSTORE_PASS=$keystore_pass"
            echo "ANDROID_KEYALIAS_NAME=$keyalias_name"
            echo "ANDROID_KEYALIAS_PASS=$keyalias_pass"
            echo "ANDROID_SIGNING_PROFILE=$profile_name"
          } >> "$GITHUB_ENV"
          echo "Using Android signing profile: $profile_name"

      - name: Download custom icon from URL
        shell: bash
        env:
          ICON_PNG_PATH: ${{ inputs.icon_png_path }}
        run: |
          set -euo pipefail
          
          if [ -z "$ICON_PNG_PATH" ]; then
            echo "No icon_png_path provided, will use project default icon"
            exit 0
          fi
          
          # Check if it's a URL (https://)
          if [[ "$ICON_PNG_PATH" == https://* ]]; then
            echo "📥 Downloading icon from URL: $ICON_PNG_PATH"
            
            # Create directory for downloaded icons
            mkdir -p game/Assets/DownloadedIcons
            
            # Download the icon
            curl -L --fail --max-time 30 "$ICON_PNG_PATH" -o game/Assets/DownloadedIcons/custom-icon.png
            
            if [ -f game/Assets/DownloadedIcons/custom-icon.png ]; then
              file_size=$(stat -c%s game/Assets/DownloadedIcons/custom-icon.png 2>/dev/null || stat -f%z game/Assets/DownloadedIcons/custom-icon.png)
              echo "✅ Icon downloaded successfully ($file_size bytes)"
              echo "ANDROID_ICON_PNG_PATH=Assets/DownloadedIcons/custom-icon.png" >> "$GITHUB_ENV"
            else
              echo "❌ Failed to download icon from $ICON_PNG_PATH"
              exit 1
            fi
          else
            # It's a repository path - validate it exists
            if [ -f "game/$ICON_PNG_PATH" ]; then
              echo "✅ Using icon from repository: $ICON_PNG_PATH"
              echo "ANDROID_ICON_PNG_PATH=$ICON_PNG_PATH" >> "$GITHUB_ENV"
            else
              echo "❌ Icon not found in repository: $ICON_PNG_PATH"
              exit 1
            fi
          fi

      - name: Prepare Android icon override
        shell: bash
        env:
          ICON_PNG_PATH: ${{ inputs.icon_png_path }}
        run: |
          set -euo pipefail
          mkdir -p game/Assets/Editor
          cat > game/Assets/Editor/ZeyWinAndroidIconPreprocessor.cs <<'CS'
          using System;
          using System.IO;
          using System.Linq;
          using System.Reflection;
          using UnityEditor;
          using UnityEditor.Build;
          using UnityEditor.Build.Reporting;
          using UnityEditor.Android;
          using UnityEngine;

          public sealed class ZeyWinAndroidIconPreprocessor : IPreprocessBuildWithReport
          {
              public int callbackOrder => -10000;

              public void OnPreprocessBuild(BuildReport report)
              {
                  if (report.summary.platform != BuildTarget.Android)
                      return;

                  ApplyIcon();
              }

              private static void ApplyIcon()
              {
                  var iconPath = ReadConfig("ANDROID_ICON_PNG_PATH", "iconPngPath");
                  if (string.IsNullOrWhiteSpace(iconPath))
                  {
                      Debug.Log("[ZeyWinActions] Android icon override is not set; keeping project icon.");
                      return;
                  }

                  iconPath = iconPath.Trim().Replace("\\", "/").TrimStart('/');

                  // Если пришёл URL — скачиваем иконку внутри Unity Editor
                  if (iconPath.StartsWith("https://", StringComparison.OrdinalIgnoreCase) ||
                      iconPath.StartsWith("http://", StringComparison.OrdinalIgnoreCase))
                  {
                      Debug.Log("[ZeyWinActions] Downloading icon from URL: " + iconPath);
                      var localDir = "Assets/DownloadedIcons";
                      var localPath = localDir + "/custom-icon.png";

                      if (!Directory.Exists(localDir))
                          Directory.CreateDirectory(localDir);

                      try
                      {
                          using (var webClient = new System.Net.WebClient())
                          {
                              webClient.Headers.Add("User-Agent", "Unity-Editor/5.0");
                              webClient.DownloadFile(iconPath, localPath);
                          }

                          if (!File.Exists(localPath))
                              throw new Exception("Downloaded file not found");

                          var fileSize = new FileInfo(localPath).Length;
                          Debug.Log("[ZeyWinActions] Icon downloaded successfully (" + fileSize + " bytes)");

                          AssetDatabase.ImportAsset(localPath, ImportAssetOptions.ForceUpdate);
                          iconPath = localPath;
                      }
                      catch (Exception ex)
                      {
                          throw new Exception("[ZeyWinActions] Failed to download icon from " + iconPath + ": " + ex.Message);
                      }
                  }
                  else
                  {
                      // Локальный путь — проверяем что он под Assets/
                      if (!iconPath.StartsWith("Assets/", StringComparison.Ordinal) || !iconPath.EndsWith(".png", StringComparison.OrdinalIgnoreCase))
                          throw new Exception("[ZeyWinActions] icon_png_path must point to a PNG file under Assets/: " + iconPath);

                      if (!File.Exists(iconPath))
                          throw new FileNotFoundException("[ZeyWinActions] Selected Android icon was not found in checked-out game repo.", iconPath);
                  }

                  var importer = AssetImporter.GetAtPath(iconPath) as TextureImporter;
                  if (importer != null)
                  {
                      importer.textureType = TextureImporterType.Default;
                      importer.textureShape = TextureImporterShape.Texture2D;
                      importer.mipmapEnabled = false;
                      importer.alphaIsTransparency = true;
                      importer.SaveAndReimport();
                  }

                  AssetDatabase.ImportAsset(iconPath, ImportAssetOptions.ForceUpdate);
                  var icon = AssetDatabase.LoadAssetAtPath<Texture2D>(iconPath);
                  if (icon == null)
                      throw new Exception("[ZeyWinActions] Selected Android icon PNG could not be loaded by Unity: " + iconPath);

                  ApplyPlatformIcons(icon);
                  AssetDatabase.SaveAssets();
                  Debug.Log("[ZeyWinActions] Android app icon override applied from " + iconPath);
              }

              private static void ApplyPlatformIcons(Texture2D icon)
              {
                  var unityEditor = typeof(PlayerSettings).Assembly;
                  var namedBuildTargetType = unityEditor.GetType("UnityEditor.Build.NamedBuildTarget");
                  var iconKindType = unityEditor.GetType("UnityEditor.AndroidPlatformIconKind");
                  if (namedBuildTargetType == null || iconKindType == null)
                      return;

                  var androidTarget = namedBuildTargetType.GetProperty("Android", BindingFlags.Public | BindingFlags.Static)?.GetValue(null);
                  var getIcons = typeof(PlayerSettings).GetMethods(BindingFlags.Public | BindingFlags.Static)
                      .FirstOrDefault(method => method.Name == "GetPlatformIcons" && method.GetParameters().Length == 2);
                  var setIcons = typeof(PlayerSettings).GetMethods(BindingFlags.Public | BindingFlags.Static)
                      .FirstOrDefault(method => method.Name == "SetPlatformIcons" && method.GetParameters().Length == 3);
                  if (androidTarget == null || getIcons == null || setIcons == null)
                      return;

                  foreach (var kindName in new[] { "Legacy", "Round", "Adaptive" })
                  {
                      try
                      {
                          if (!Enum.IsDefined(iconKindType, kindName))
                              continue;

                          var kind = Enum.Parse(iconKindType, kindName);
                          var platformIcons = getIcons.Invoke(null, new[] { androidTarget, kind }) as Array;
                          if (platformIcons == null)
                              continue;

                          foreach (var platformIcon in platformIcons)
                          {
                              var setTextures = platformIcon.GetType().GetMethod("SetTextures", new[] { typeof(Texture2D[]) });
                              if (setTextures == null)
                                  continue;

                              setTextures.Invoke(platformIcon, new object[] { kindName == "Adaptive" ? new[] { icon, icon } : new[] { icon } });
                          }

                          setIcons.Invoke(null, new object[] { androidTarget, kind, platformIcons });
                      }
                      catch (Exception ex)
                      {
                          Debug.LogWarning("[ZeyWinActions] Could not apply " + kindName + " Android icon slot: " + ex.Message);
                      }
                  }
              }

              private static string ReadConfig(string envName, string argName)
              {
                  var value = Environment.GetEnvironmentVariable(envName);
                  if (!string.IsNullOrWhiteSpace(value))
                      return value;

                  var args = Environment.GetCommandLineArgs();
                  for (var i = 0; i < args.Length - 1; i++)
                  {
                      if (args[i] == "-" + argName)
                          return args[i + 1];
                  }

                  return string.Empty;
              }
          }

          public sealed class ZeyWinAndroidGradleFinalizer : IPostGenerateGradleAndroidProject
          {
              public int callbackOrder => 300000;

              public void OnPostGenerateGradleAndroidProject(string path)
              {
                  PatchLegacyResourceNamespace(path);
                  PatchLauncherLabelOverride(path);
              }

              private static void PatchLegacyResourceNamespace(string path)
              {
                  var gradle = Path.Combine(path, "ZeyWinLegacyRes.androidlib", "build.gradle");
                  if (!File.Exists(gradle))
                      return;

                  var text = File.ReadAllText(gradle);
                  if (!text.Contains("namespace "))
                  {
                      if (text.Contains("android {"))
                          text = text.Replace("android {", "android {\n    compileSdk 34\n    namespace 'com.zeywin.legacyres'");
                      else
                          text += "\nandroid {\n    compileSdk 34\n    namespace 'com.zeywin.legacyres'\n}\n";
                      File.WriteAllText(gradle, text);
                  }
                  else if (!text.Contains("compileSdk"))
                  {
                      text = text.Replace("namespace", "compileSdk 34\n    namespace");
                      File.WriteAllText(gradle, text);
                  }

                  UnityEngine.Debug.Log("[ZeyWinActions] Legacy Android resource namespace verified: " + gradle);
              }

              private static void PatchLauncherLabelOverride(string path)
              {
                  var launcherManifest = Path.GetFullPath(Path.Combine(path, "../launcher/src/main/AndroidManifest.xml"));
                  if (!File.Exists(launcherManifest))
                      return;

                  var text = File.ReadAllText(launcherManifest);
                  if (!text.Contains("xmlns:tools="))
                      text = text.Replace("<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"", "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\" xmlns:tools=\"http://schemas.android.com/tools\"");

                  var applicationIndex = text.IndexOf("<application", System.StringComparison.Ordinal);
                  if (applicationIndex >= 0 && !text.Contains("tools:replace=\"android:label\""))
                  {
                      var closeIndex = text.IndexOf('>', applicationIndex);
                      if (closeIndex > applicationIndex)
                          text = text.Insert(closeIndex, " tools:replace=\"android:label\"");
                  }

                  File.WriteAllText(launcherManifest, text);
                  UnityEngine.Debug.Log("[ZeyWinActions] Launcher manifest label override verified: " + launcherManifest);
              }
          }
          CS
          
          # Note: ANDROID_ICON_PNG_PATH is set by previous step "Download custom icon from URL"
          # This preprocessor script will read it from environment

      - name: Resolve APK version
        id: resolve_version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          VERSION_MODE: ${{ inputs.version_mode }}
          VERSION_NAME_INPUT: ${{ inputs.version_name }}
          VERSION_CODE_INPUT: ${{ inputs.version_code }}
        run: |
          set -euo pipefail

          max_code=0
          latest_file="builds/$PACKAGE_NAME/latest-build.txt"
          if [ -f "$latest_file" ]; then
            code="$(sed -n 's/^version_code=//p' "$latest_file" | tail -n 1)"
            if [[ "$code" =~ ^[0-9]+$ ]] && [ "$code" -gt "$max_code" ]; then
              max_code="$code"
            fi
          fi

          while IFS= read -r dir; do
            code="${dir##*/v}"
            if [[ "$code" =~ ^[0-9]+$ ]] && [ "$code" -gt "$max_code" ]; then
              max_code="$code"
            fi
          done < <(find "builds/$PACKAGE_NAME" -maxdepth 1 -type d -name 'v[0-9]*' 2>/dev/null || true)

          while IFS= read -r code; do
            if [[ "$code" =~ ^[0-9]+$ ]] && [ "$code" -gt "$max_code" ]; then
              max_code="$code"
            fi
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json name --jq '.[].name' 2>/dev/null | sed -n "s/^APK $PACKAGE_NAME v\\([0-9][0-9]*\\)$/\\1/p" || true)

          if [ "$VERSION_MODE" = "manual" ]; then
            test -n "$VERSION_NAME_INPUT" || { echo "version_name is required when version_mode=manual. Example: 1.0.$((max_code + 1))"; exit 1; }
            test -n "$VERSION_CODE_INPUT" || { echo "version_code is required when version_mode=manual. Previous highest code is $max_code, so use $((max_code + 1)) or higher."; exit 1; }
          fi

          if [ "$VERSION_MODE" = "manual" ]; then
            version_code="$VERSION_CODE_INPUT"
          else
            version_code=$((max_code + 1))
          fi

          if ! [[ "$version_code" =~ ^[0-9]+$ ]]; then
            echo "version_code must be numeric, got: $version_code"
            exit 1
          fi

          if [ "$version_code" -lt 1 ]; then
            echo "version_code must be a positive integer, got: $version_code"
            exit 1
          fi

          if [ "$VERSION_MODE" = "manual" ]; then
            version_name="$VERSION_NAME_INPUT"
          else
            version_name="1.0.$version_code"
          fi

          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "apk_output_path=$GITHUB_WORKSPACE/build/android/APK_${PACKAGE_NAME}_v${version_code}.apk" >> "$GITHUB_OUTPUT"
          echo "aab_output_path=$GITHUB_WORKSPACE/build/android/AAB_${PACKAGE_NAME}_v${version_code}.aab" >> "$GITHUB_OUTPUT"

          {
            echo "### Resolved APK version"
            echo "- Package: \`$PACKAGE_NAME\`"
            echo "- Mode: \`$VERSION_MODE\`"
            echo "- Previous highest version code: \`$max_code\`"
            echo "- Next manual version name/code: \`1.0.$((max_code + 1))\` / \`$((max_code + 1))\`"
            echo "- Version name: \`$version_name\`"
            echo "- Version code: \`$version_code\`"
            if [ "$VERSION_MODE" = "manual" ] && [ "$version_code" -le "$max_code" ]; then
              echo "- Note: this is an old-version rebuild, so it will not replace the latest-build pointer."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

