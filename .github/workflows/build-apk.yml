      - name: Install Unity Android legacy resource preprocessor
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p game/Assets/Editor
          cat > game/Assets/Editor/ZeyWinAndroidLegacyResourcePreprocessor.cs <<'CS'
          using System.IO;
          using UnityEditor;
          using UnityEditor.Build;
          using UnityEditor.Build.Reporting;

          public sealed class ZeyWinAndroidLegacyResourcePreprocessor : IPreprocessBuildWithReport
          {
              public int callbackOrder => 200000;

              public void OnPreprocessBuild(BuildReport report)
              {
                  if (report.summary.platform != BuildTarget.Android)
                      return;

                  var legacy = "Assets/Plugins/Android/res";
                  if (!Directory.Exists(legacy))
                  {
                      UnityEngine.Debug.Log("[ZeyWinActions] No obsolete Android resources in Assets/Plugins/Android/res during Unity prebuild.");
                      return;
                  }

                  var androidLib = "Assets/Plugins/Android/ZeyWinLegacyRes.androidlib";
                  var target = Path.Combine(androidLib, "src/main/res");
                  if (Directory.Exists(target))
                      Directory.Delete(target, true);

                  Directory.CreateDirectory(Path.GetDirectoryName(target));
                  Directory.Move(legacy, target);
                  File.WriteAllText(Path.Combine(androidLib, "AndroidManifest.xml"), "<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\" package=\"com.zeywin.legacyres\" />");
                  File.WriteAllText(Path.Combine(androidLib, "build.gradle"), "plugins {\n    id 'com.android.library'\n}\n\nandroid {\n    compileSdk 34\n    namespace 'com.zeywin.legacyres'\n}\n");

                  FileUtil.DeleteFileOrDirectory(legacy);
                  FileUtil.DeleteFileOrDirectory(legacy + ".meta");
                  if (Directory.Exists(legacy))
                      Directory.Delete(legacy, true);
                  if (File.Exists(legacy + ".meta"))
                      File.Delete(legacy + ".meta");

                  AssetDatabase.Refresh(ImportAssetOptions.ForceUpdate);
                  if (Directory.Exists(legacy))
                      throw new System.Exception("[ZeyWinActions] Obsolete Android resources folder still exists after cleanup: " + legacy);

                  UnityEngine.Debug.Log("[ZeyWinActions] Moved obsolete Android resources into Android Library and removed legacy folder during Unity prebuild: " + androidLib);
              }
          }
          CS

