      - name: Prepare Firebase SDK
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -R --include='*.cs' -E 'using Firebase|Firebase\.' game/Assets >/dev/null 2>&1; then
            echo "No Firebase C# references found; skipping Firebase SDK preparation."
            exit 0
          fi

          if [ -d game/Assets/Firebase ]; then
            echo "Assets/Firebase already exists; keeping game Firebase SDK files."
            exit 0
          fi

          echo "Firebase C# references found; installing Firebase Unity SDK 13.0.0."
          work="$RUNNER_TEMP/firebase-unity-sdk"
          rm -rf "$work"
          mkdir -p "$work"
          curl -L --retry 3 --retry-delay 5 --connect-timeout 30 \
            -o "$work/firebase_unity_sdk_13.0.0.zip" \
            https://dl.google.com/firebase/sdk/unity/firebase_unity_sdk_13.0.0.zip
          unzip -q "$work/firebase_unity_sdk_13.0.0.zip" \
            '*FirebaseAnalytics*.unitypackage' \
            '*FirebaseRemoteConfig*.unitypackage' \
            '*FirebaseMessaging*.unitypackage' \
            -d "$work/packages"
          find "$work/packages" -name '*.unitypackage' -print | sort

          python3 <<'PY'
          import os
          import pathlib
          import shutil
          import tarfile
          import tempfile

          root = pathlib.Path('game')
          package_dir = pathlib.Path(os.environ['RUNNER_TEMP']) / 'firebase-unity-sdk' / 'packages'
          packages = []
          for needle in ('FirebaseAnalytics', 'FirebaseRemoteConfig', 'FirebaseMessaging'):
              matches = sorted(package_dir.rglob(f'*{needle}*.unitypackage'))
              if not matches:
                  raise FileNotFoundError(f'Firebase Unity package not found in SDK zip: {needle}')
              packages.append(matches[0])

          for package in packages:
              print(f'Extracting {package.name}')
              with tempfile.TemporaryDirectory() as td:
                  temp = pathlib.Path(td)
                  with tarfile.open(package, 'r:gz') as tar:
                      tar.extractall(temp)
                  for entry in temp.iterdir():
                      pathname = entry / 'pathname'
                      asset = entry / 'asset'
                      meta = entry / 'asset.meta'
                      if not pathname.exists() or not asset.exists():
                          continue
                      rel = pathname.read_text(encoding='utf-8').strip()
                      if not rel.startswith('Assets/'):
                          continue
                      out = root / rel
                      out.parent.mkdir(parents=True, exist_ok=True)
                      shutil.copyfile(asset, out)
                      if meta.exists():
                          shutil.copyfile(meta, pathlib.Path(str(out) + '.meta'))

          print('Firebase Unity SDK files prepared.')
          PY

          find game/Assets/Firebase -maxdepth 3 -type f | sed -n '1,80p'

